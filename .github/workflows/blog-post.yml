name: Generate Blog Post

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "Target keyword for the blog post (ignored if --from-queue)"
        required: false
        type: string
      topic_id:
        description: "Specific topic ID from queue (optional)"
        required: false
        type: number
  schedule:
    # Mon/Wed/Fri at 03:00 UTC (11:00 AM PHT) — one post per run, 3 review PRs/week.
    - cron: "0 3 * * 1,3,5"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate blog post
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OpenAI runs the blog-content-evaluator (judge) — cross-provider grading.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional — when unset, the agent's Langfuse layer is a clean no-op.
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASEURL: ${{ secrets.LANGFUSE_BASEURL }}
        run: |
          if [ -n "${{ inputs.keyword }}" ]; then
            node scripts/blog-agent/run.mjs --keyword "${{ inputs.keyword }}"
          elif [ -n "${{ inputs.topic_id }}" ]; then
            node scripts/blog-agent/run.mjs --from-queue --id ${{ inputs.topic_id }}
          else
            node scripts/blog-agent/run.mjs --from-queue
          fi

      - name: Seed prompts to Langfuse
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASEURL: ${{ secrets.LANGFUSE_BASEURL }}
        # Seeds the three canonical prompts (production label). Self-guards
        # (no keys -> no-op) and never fails the pipeline.
        run: node scripts/blog-agent/sync-prompt.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/ scripts/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create review PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=$(cat /tmp/blog-slug.txt)
          BRANCH="auto/blog-${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1) Queue bookkeeping → main directly, so the next Mon/Wed/Fri run
          #    won't re-pick this topic while the content PR is in review.
          #    Set the content changes aside, commit only the queue, push to main.
          git stash push -- src scripts/blog-agent/output 2>/dev/null || true
          git add scripts/blog-agent/topic-queue.json
          if git commit -m "queue: advance after ${SLUG} (automated)"; then
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "Queue push skipped (protected branch?)."
          else
            echo "No queue change."
          fi
          git stash pop 2>/dev/null || true

          # 2) Content → review PR (NO auto-merge). src/ for new posts; output/ for
          #    update/merge action packages.
          git checkout -B "$BRANCH"
          git add src/ scripts/blog-agent/output 2>/dev/null || git add src/
          git commit -m "blog: ${SLUG} (automated)"
          git push -u --force-with-lease origin "$BRANCH"
          gh label create "blog" --color "5319E7" --description "Blog post PR" 2>/dev/null || true
          gh pr create \
            --title "blog: ${SLUG}" \
            --body-file /tmp/pr-body.md \
            --label "blog" \
            || gh pr edit "$BRANCH" --body-file /tmp/pr-body.md
