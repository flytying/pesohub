name: Generate Blog Post

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "Target keyword for the blog post (ignored if --from-queue)"
        required: false
        type: string
      topic_id:
        description: "Specific topic ID from queue (optional)"
        required: false
        type: number
  schedule:
    # Weekly on Monday at 03:00 UTC (11:00 AM PHT)
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate blog post
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — when unset, the agent's Braintrust layer is a clean no-op.
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        run: |
          if [ -n "${{ inputs.keyword }}" ]; then
            node scripts/blog-agent/run.mjs --keyword "${{ inputs.keyword }}"
          elif [ -n "${{ inputs.topic_id }}" ]; then
            node scripts/blog-agent/run.mjs --from-queue --id ${{ inputs.topic_id }}
          else
            node scripts/blog-agent/run.mjs --from-queue
          fi

      - name: Sync prompt mirror to Braintrust
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        # Updates the Braintrust Prompts mirror only when SYSTEM_PROMPT changed.
        # Self-guards (no key -> no-op) and never fails the pipeline.
        run: node scripts/blog-agent/sync-prompt.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/ scripts/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=$(cat /tmp/blog-slug.txt)
          BRANCH="auto/blog-${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B resets the branch if a stale one lingers; force-with-lease keeps
          # evergreen refresh (same slug → same branch name) from being rejected.
          git checkout -B "$BRANCH"
          git add src/ scripts/blog-agent/topic-queue.json
          git commit -m "blog: add post — ${SLUG} (automated)"
          git push -u --force-with-lease origin "$BRANCH"
          # Ensure label exists (idempotent)
          gh label create "blog" --color "5319E7" --description "Blog post PR" 2>/dev/null || true
          PR_URL=$(gh pr create \
            --title "blog: ${SLUG}" \
            --body-file /tmp/pr-body.md \
            --label "blog")
          gh pr merge "$PR_URL" --squash --auto --delete-branch || gh pr merge "$PR_URL" --squash --delete-branch
