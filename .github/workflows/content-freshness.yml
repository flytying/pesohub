name: Content Freshness Check

on:
  schedule:
    # Every Monday at 9:00 AM PHT (1:00 UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run freshness check
        id: check
        run: |
          node scripts/check-content-freshness.mjs --github 2>&1 | tee freshness-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Find existing freshness issue
        if: always()
        id: find-issue
        run: |
          ISSUE=$(gh issue list --label "content-freshness" --state open --json number --jq '.[0].number // empty')
          echo "issue-number=$ISSUE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new issue if stale content found
        if: steps.check.outputs.exit_code == '1' && hashFiles('.github/freshness-report.md') != '' && steps.find-issue.outputs.issue-number == ''
        run: |
          gh issue create \
            --title "📋 Content freshness review needed" \
            --body-file .github/freshness-report.md \
            --label "content-freshness"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing issue
        if: steps.check.outputs.exit_code == '1' && hashFiles('.github/freshness-report.md') != '' && steps.find-issue.outputs.issue-number != ''
        run: |
          gh issue comment ${{ steps.find-issue.outputs.issue-number }} \
            --body-file .github/freshness-report.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue if all fresh
        if: steps.check.outputs.exit_code == '0' && steps.find-issue.outputs.issue-number != ''
        run: |
          gh issue close "${{ steps.find-issue.outputs.issue-number }}" \
            --comment "✅ All content is within review cadence. Closing automatically."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack — stale content
        if: steps.check.outputs.exit_code == '1' && hashFiles('.github/freshness-report.md') != ''
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: info
          title: "Content freshness review needed"
          message: "Some YMYL content is past its review cadence."
          url: ${{ github.server_url }}/${{ github.repository }}/issues?q=is%3Aissue+is%3Aopen+label%3Acontent-freshness

      - name: Notify Slack — run failed
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "Content Freshness Check workflow failed"
          message: "The freshness job errored. Check the run logs."
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
