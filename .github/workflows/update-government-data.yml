name: Update Government Data

on:
  schedule:
    # 1st of each month at 03:00 UTC (11:00 AM PHT)
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run government data updater
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/data-updater/run-update.mjs --sources sss-contribution,sss-pension,pagibig-housing,pagibig-contribution,pagibig-mp2,philhealth,withholding-tax

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/update-gov-data-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/government/
          git commit -m "chore: update government data (automated)"
          # Force-push to handle re-runs on the same day. If a PR already
          # exists for this branch, it gets updated in place; otherwise create.
          git push -u origin "$BRANCH" --force
          # Ensure labels exist (idempotent)
          gh label create "auto-update" --color "0E8A16" --description "Automated update PR" 2>/dev/null || true
          gh label create "needs-review" --color "D93F0B" --description "Needs human review" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: update government data $(date +%Y-%m-%d)" \
              --body-file /tmp/pr-body.md \
              --label "auto-update,needs-review"
          else
            echo "PR #$EXISTING_PR already exists for $BRANCH — updated via force push."
            gh pr edit "$EXISTING_PR" --body-file /tmp/pr-body.md
          fi

      - name: Fail if any source failed
        if: always()
        run: |
          if [ -f /tmp/data-updater-failed.txt ]; then
            echo "::error::Data updater had failures:"
            cat /tmp/data-updater-failed.txt
            exit 1
          fi
