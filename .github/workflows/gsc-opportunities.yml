name: GSC Content Opportunities

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the issue but skip creating/updating it"
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly on Monday at 01:30 UTC (09:30 AM PHT) — lands the review issue
    # before the 03:00 UTC blog-post generation cron.
    - cron: "30 1 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  opportunities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Find opportunities
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — Langfuse layer is a clean no-op when unset.
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASEURL: ${{ secrets.LANGFUSE_BASEURL }}
          # GitHub handle to @mention/assign when pages need updates.
          # Override with repo variable NOTIFY_GH_HANDLE; defaults to the repo owner.
          NOTIFY_GH_HANDLE: ${{ vars.NOTIFY_GH_HANDLE || github.repository_owner }}
          # How many new-post decisions to auto-queue per week (override via repo var).
          PROMOTE_COUNT: ${{ vars.PROMOTE_COUNT || '3' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/blog-agent/gsc-opportunities.mjs --dry-run
          else
            node scripts/blog-agent/gsc-opportunities.mjs
          fi

      - name: Open or update review issue
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_GH_HANDLE: ${{ vars.NOTIFY_GH_HANDLE || github.repository_owner }}
        run: |
          TITLE=$(cat /tmp/gsc-issue-title.txt)
          UPDATES=$(cat /tmp/gsc-update-count.txt 2>/dev/null || echo 0)
          gh label create "gsc-opportunities" --color "1D76DB" \
            --description "Weekly GSC content opportunities" 2>/dev/null || true
          # Rolling per-week issue: update if one with this exact title is open.
          EXISTING=$(gh issue list --state open --label "gsc-opportunities" \
            --json number,title \
            --jq ".[] | select(.title==\"${TITLE}\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file /tmp/gsc-issue.md
            NUM="$EXISTING"
            echo "Updated issue #$EXISTING"
          else
            URL=$(gh issue create --title "$TITLE" --body-file /tmp/gsc-issue.md \
              --label "gsc-opportunities")
            NUM="${URL##*/}"
            echo "Created issue #$NUM"
          fi
          # Notify: assign the issue when ≥1 page needs an update. The @mention
          # in the body (added by the reporter) also triggers a notification.
          if [ "$UPDATES" -gt 0 ] && [ -n "$NOTIFY_GH_HANDLE" ]; then
            gh issue edit "$NUM" --add-assignee "$NOTIFY_GH_HANDLE" \
              && echo "Assigned #$NUM to $NOTIFY_GH_HANDLE ($UPDATES updates)" \
              || echo "Assign failed (handle not a collaborator?) — @mention still notifies."
          fi

      - name: Commit ledger + auto-queued topics
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ledger + any topics the analysis auto-promoted into the queue.
          if ! git diff --quiet scripts/blog-agent/gsc-suggestions-log.json scripts/blog-agent/topic-queue.json; then
            git add scripts/blog-agent/gsc-suggestions-log.json scripts/blog-agent/topic-queue.json
            git commit -m "gsc: ledger + auto-queued topics (automated)"
            git pull --rebase origin main || true
            # Non-fatal: a protected main just means it isn't persisted in CI.
            git push || echo "Push skipped (protected branch?)"
          fi
