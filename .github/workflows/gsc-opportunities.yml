name: GSC Content Opportunities

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the issue but skip creating/updating it"
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly on Monday at 01:30 UTC (09:30 AM PHT) — lands the review issue
    # before the 03:00 UTC blog-post generation cron.
    - cron: "30 1 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  opportunities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Find opportunities
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — Braintrust layer is a clean no-op when unset.
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/blog-agent/gsc-opportunities.mjs --dry-run
          else
            node scripts/blog-agent/gsc-opportunities.mjs
          fi

      - name: Open or update review issue
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(cat /tmp/gsc-issue-title.txt)
          gh label create "gsc-opportunities" --color "1D76DB" \
            --description "Weekly GSC content opportunities" 2>/dev/null || true
          # Rolling per-week issue: update if one with this exact title is open.
          EXISTING=$(gh issue list --state open --label "gsc-opportunities" \
            --json number,title \
            --jq ".[] | select(.title==\"${TITLE}\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file /tmp/gsc-issue.md
            echo "Updated issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body-file /tmp/gsc-issue.md \
              --label "gsc-opportunities"
          fi

      - name: Commit suggestions ledger
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet scripts/blog-agent/gsc-suggestions-log.json; then
            git add scripts/blog-agent/gsc-suggestions-log.json
            git commit -m "gsc: update suggestions ledger (automated)"
            # Non-fatal: a protected main just means the ledger isn't persisted
            # in CI; the eval --feedback pass still works locally.
            git push || echo "Ledger push skipped (protected branch?)"
          fi
