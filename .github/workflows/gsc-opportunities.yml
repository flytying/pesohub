name: GSC Blog Opportunities

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the issue but skip creating/updating it"
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly on Monday at 01:30 UTC (09:30 AM PHT) — lands the blog-post review
    # issue and auto-queues new posts before the 03:00 UTC blog-post cron.
    # Content updates + new supporting pages run monthly (see gsc-content.yml).
    - cron: "30 1 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  opportunities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Find blog opportunities
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — Langfuse layer is a clean no-op when unset.
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASEURL: ${{ secrets.LANGFUSE_BASEURL }}
          # How many new posts to auto-queue per week — matches the 3 blog PRs
          # the Mon/Wed/Fri cron produces (override via repo var).
          PROMOTE_COUNT: ${{ vars.PROMOTE_COUNT || '3' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/blog-agent/gsc-opportunities.mjs --track blog --dry-run
          else
            node scripts/blog-agent/gsc-opportunities.mjs --track blog
          fi

      - name: Open or update review issue
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(cat /tmp/gsc-issue-blog-title.txt)
          gh label create "gsc-blog" --color "5319E7" \
            --description "Weekly GSC blog-post opportunities" 2>/dev/null || true
          # Rolling per-week issue: update if one with this exact title is open.
          EXISTING=$(gh issue list --state open --label "gsc-blog" \
            --json number,title \
            --jq ".[] | select(.title==\"${TITLE}\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file /tmp/gsc-issue-blog.md
            echo "Updated issue #$EXISTING"
          else
            URL=$(gh issue create --title "$TITLE" --body-file /tmp/gsc-issue-blog.md \
              --label "gsc-blog")
            echo "Created issue ${URL##*/}"
          fi

      - name: Commit ledger + auto-queued topics
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ledger + any topics the analysis auto-promoted into the queue.
          if ! git diff --quiet scripts/blog-agent/gsc-suggestions-log.json scripts/blog-agent/topic-queue.json; then
            git add scripts/blog-agent/gsc-suggestions-log.json scripts/blog-agent/topic-queue.json
            git commit -m "gsc: blog ledger + auto-queued posts (automated)"
            git pull --rebase origin main || true
            # Non-fatal: a protected main just means it isn't persisted in CI.
            git push || echo "Push skipped (protected branch?)"
          fi
