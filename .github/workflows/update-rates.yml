name: Update Exchange Rates

on:
  schedule:
    # 1:00 UTC = 9:00 AM PHT (Mon-Fri, when BSP publishes daily rate)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-rates:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update exchange rates
        run: node scripts/update-exchange-rates.mjs

      - name: Verify build passes
        run: npm run build

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/rates/exchange-rates.ts
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update USD/PHP exchange rate"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  # Trigger deploy if rates were updated
  deploy:
    needs: update-rates
    if: needs.update-rates.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
