name: Update Bank Rates

on:
  schedule:
    # 1st and 15th of each month at 02:00 UTC (10:00 AM PHT)
    - cron: "0 2 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        # Rendered-page extraction for JS-only bank rate pages (#202).
        run: npx playwright install --with-deps chromium

      - name: Run bank rate updater
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/data-updater/run-update.mjs --sources savings-rates,digital-rates,time-deposit-rates

      - name: Typecheck regenerated data (schema-drift guard)
        # The updater rewrites each data file from a hardcoded interface +
        # emitter. If those drift from what the pages consume, the Vercel build
        # breaks (see #200). Fail here — before any PR is opened — so a drift is
        # a red run + email, never a broken preview deploy. (#201)
        run: npx tsc --noEmit

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        id: pr
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/update-bank-rates-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/rates/
          git commit -m "chore: update bank rates (automated)"
          # Force-push to handle re-runs on the same day (e.g., rerunning after
          # fixing a partial failure). If a PR already exists for this branch,
          # it gets updated in place; if not, we create one.
          git push -u origin "$BRANCH" --force
          # Ensure labels exist (idempotent)
          gh label create "auto-update" --color "0E8A16" --description "Automated update PR" 2>/dev/null || true
          gh label create "needs-review" --color "D93F0B" --description "Needs human review" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: update bank rates $(date +%Y-%m-%d)" \
              --body-file /tmp/pr-body.md \
              --label "auto-update,needs-review"
          else
            echo "PR #$EXISTING_PR already exists for $BRANCH — updated via force push."
            gh pr edit "$EXISTING_PR" --body-file /tmp/pr-body.md
          fi
          echo "url=$(gh pr view "$BRANCH" --json url --jq .url)" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — PR opened
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: info
          title: "Bank rates PR needs review"
          message: "Automated scrape detected changes. Review and merge to publish."
          url: ${{ steps.pr.outputs.url }}

      - name: Fail if any source failed
        if: always()
        run: |
          if [ -f /tmp/data-updater-failed.txt ]; then
            echo "::error::Data updater had failures:"
            cat /tmp/data-updater-failed.txt
            exit 1
          fi

      - name: Notify Slack — run failed
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: "Update Bank Rates workflow failed"
          message: "A source failed to scrape. Check the run logs."
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
